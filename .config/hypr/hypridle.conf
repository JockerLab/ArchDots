listener {
    timeout = 120
    on-timeout = hyprlock -c ~/.config/hypr/themes/hypr_catppuccin/hyprlock.conf
}

# Выключает экран через 2.5 мин
listener {
    timeout = 150
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 600                           # 10min
    on-timeout = systemctl suspend
}
