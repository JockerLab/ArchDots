# =============================================================
# Hypridle — Idle / Auto-lock Configuration
# =============================================================
# Listeners fire in order of their timeout (seconds).
# on-timeout: runs when idle duration is reached
# on-resume:  runs when activity is detected again
# =============================================================

# 1m50s — dim screen to 50% to signal inactivity
listener {
    timeout    = 110
    on-timeout = brightnessctl -s set 50%
    on-resume  = brightnessctl -r
}

# 2m — lock screen
listener {
    timeout    = 120
    on-timeout = hyprlock -c ~/.config/hypr/hyprlock.conf
}

# 2m30s — turn off display entirely
listener {
    timeout    = 150
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 10m — suspend to RAM
listener {
    timeout    = 600
    on-timeout = systemctl suspend
}
