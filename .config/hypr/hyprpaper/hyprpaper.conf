# =============================================================
# Hyprpaper — Wallpaper Configuration
# =============================================================
# TO CHANGE WALLPAPER:
#   Replace the path in both lines below with your image path,
#   OR rename your image to "main.png" in the wallpapers folder.
#   Then reload: killall hyprpaper && hyprpaper -c <this file> &
#
# Wallpaper folder: ~/.config/hypr/wallpapers/
# Same image is used in hyprlock — update hyprlock.conf too.
# =============================================================

# Preload image into memory before display
preload = ~/.config/hypr/wallpapers/main.png

# Assign to monitor (eDP-1 = built-in laptop display)
wallpaper = eDP-1,~/.config/hypr/wallpapers/main.png
