# =============================================================
# Window & Layer Rules (Hyprland 0.46+ block syntax)
# =============================================================

# Waybar blur
layerrule {
    name = waybar-blur
    match:namespace = ^(waybar)$

    blur = true
}

# Suppress maximize requests from apps
windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

# Prevent phantom XWayland popups from stealing focus
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Per-app transparency
windowrule {
    name = kitty-opacity
    match:class = ^(kitty)$

    opacity = 0.90 0.90
}

windowrule {
    name = brave-opacity
    match:class = ^(Brave-browser)$

    opacity = 0.90 0.90
}
