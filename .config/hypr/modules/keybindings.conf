# =============================================================
# Keybindings
# =============================================================
# $mainMod is defined in variables.conf (default: SUPER / Win key)
# bind   — regular key press
# bindm  — mouse button bind
# bindel — repeatable key (held down)
# bindl  — lock-screen passthrough

# -------------------------------------------------------------
# Core window management
# -------------------------------------------------------------
bind = $mainMod, RETURN, exec, $terminal         # Open terminal
bind = $mainMod, Q,      killactive,              # Close active window
bind = $mainMod, M,      exit,                    # Exit Hyprland session
bind = $mainMod, E,      exec, $fileManager       # Open file manager
bind = $mainMod, V,      togglefloating,          # Toggle floating mode
bind = $mainMod, D,      exec, $menu              # Open application launcher
bind = $mainMod, P,      pseudo,                  # Dwindle: toggle pseudo-tile
bind = $mainMod, J,      togglesplit,             # Dwindle: toggle split direction
bind = $mainMod, L,      exec, hyprlock -c ~/.config/hypr/hyprlock.conf  # Lock screen

# -------------------------------------------------------------
# Focus movement (arrow keys)
# -------------------------------------------------------------
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# -------------------------------------------------------------
# Switch to workspace 1–10
# -------------------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# -------------------------------------------------------------
# Move active window to workspace 1–10
# -------------------------------------------------------------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# -------------------------------------------------------------
# Special (scratchpad) workspace
# -------------------------------------------------------------
bind = $mainMod,       S, togglespecialworkspace, magic  # Show/hide scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:magic  # Send window to scratchpad

# -------------------------------------------------------------
# Workspace scroll with mouse wheel (hold $mainMod)
# -------------------------------------------------------------
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# -------------------------------------------------------------
# Mouse: drag to move or resize floating windows
# -------------------------------------------------------------
bindm = $mainMod, mouse:272, movewindow    # Left-click drag: move
bindm = $mainMod, mouse:273, resizewindow  # Right-click drag: resize

# -------------------------------------------------------------
# Screenshots (grimblast)
# -------------------------------------------------------------
bind = , Print,             exec, grimblast copy screen   # Full screen → clipboard
bind = SHIFT, Print,        exec, grimblast copy area     # Select area → clipboard
bind = $mainMod, Print,     exec, grimblast copysave screen ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png  # Full screen → save
bind = $mainMod SHIFT, Print, exec, grimblast copysave area ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png  # Select area → save

# -------------------------------------------------------------
# Audio controls (media keys)
# -------------------------------------------------------------
bindel = ,XF86AudioRaiseVolume,  exec, ~/.config/dunst/scripts/volume_brightness.sh volume_up
bindel = ,XF86AudioLowerVolume,  exec, ~/.config/dunst/scripts/volume_brightness.sh volume_down
bindel = ,XF86AudioMute,         exec, ~/.config/dunst/scripts/volume_brightness.sh volume_mute
bindel = ,XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# -------------------------------------------------------------
# Brightness controls (media keys)
# -------------------------------------------------------------
bindel = ,XF86MonBrightnessUp,   exec, ~/.config/dunst/scripts/volume_brightness.sh brightness_up
bindel = ,XF86MonBrightnessDown, exec, ~/.config/dunst/scripts/volume_brightness.sh brightness_down

# -------------------------------------------------------------
# Media player controls (works on lock screen via bindl)
# -------------------------------------------------------------
bindl = ,XF86AudioNext,  exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay,  exec, playerctl play-pause
bindl = ,XF86AudioPrev,  exec, playerctl previous
