# =============================================================
# Autostart — programs launched once on Hyprland startup
# =============================================================

# Status bar with theme-specific config and stylesheet
exec-once = waybar -c ~/.config/hypr/waybar/config.jsonc \
                   -s ~/.config/hypr/waybar/style.css

# Wallpaper daemon (see hyprpaper/hyprpaper.conf for wallpaper path)
exec-once = hyprpaper -c ~/.config/hypr/hyprpaper/hyprpaper.conf

# GTK theme — Catppuccin Mocha Lavender Dark
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Catppuccin-Mocha-Standard-Lavender-Dark
exec-once = gsettings set org.gnome.desktop.interface icon-theme Catppuccin-Mocha-Alt2

# Notification daemon
exec-once = dunst

# Bluetooth system tray applet
exec-once = blueman-applet

# Idle manager (auto-lock, screen off, suspend — see hypridle.conf)
exec-once = hypridle

# Keyboard layout event listener — signals waybar to refresh custom/language instantly
exec-once = python3 ~/.config/hypr/waybar/scripts/language_listener.py
