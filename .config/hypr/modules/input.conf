# =============================================================
# Input — keyboard, mouse, touchpad
# =============================================================

# Keyboard: US/RU layout, toggle with Win+Space
input {
    kb_layout  = us,ru
    kb_variant =
    kb_model   =
    kb_options = grp:win_space_toggle
    kb_rules   =

    # Focus follows mouse cursor
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = true
    }
}

# Touchpad multi-finger gesture navigation
gestures {
    workspace_swipe = false
}

# Per-device sensitivity override (laptop trackpad named "epic-mouse-v1")
device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}
