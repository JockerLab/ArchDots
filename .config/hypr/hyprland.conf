# =============================================================
# Hyprland — Catppuccin Mocha Theme
# =============================================================
# This file sources all configuration modules in order.
# To change a setting, open the relevant module file below.
#
# File structure:
#   modules/variables.conf   — app shortcuts, modifier key
#   modules/monitors.conf    — monitor layout and resolution
#   modules/environment.conf — environment variables
#   modules/autostart.conf   — startup programs
#   modules/appearance.conf  — gaps, borders, blur, animations
#   modules/input.conf       — keyboard, mouse, touchpad
#   modules/keybindings.conf — all keyboard/mouse bindings
#   modules/rules.conf       — window rules and overrides
# =============================================================

# --- Core ---
source = ~/.config/hypr/modules/variables.conf
source = ~/.config/hypr/modules/monitors.conf
source = ~/.config/hypr/modules/environment.conf
source = ~/.config/hypr/modules/autostart.conf

# --- Appearance ---
source = ~/.config/hypr/modules/appearance.conf

# --- Input ---
source = ~/.config/hypr/modules/input.conf

# --- Bindings & Rules ---
source = ~/.config/hypr/modules/keybindings.conf
source = ~/.config/hypr/modules/rules.conf
